<!doctype html>
<html lang="en" data-bs-theme="dark" style="font-size: 150%">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=2">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="dist/app.js">
    </script>
  </head>
  <body>
    <h1 class="text-body-emphasis">Train french numbers</h1>
<div style="margin-top: 50pt" />
<button class="btn btn-primary btn-lg px-4" onclick="next()">Next</button>

<div style="margin-top: 20pt" />
<div id="number"></div>
<div style="margin-top: 20pt" />
<div id="solution"></div>

<script type="text/javascript">
var count = 0;

var num =getRandomNumber(); 
document.getElementById("number").innerHTML = num; 

function next() {
    if (count % 2 == 0) {
        showCorrect();
    } else {
        nextNum();
    }
    count += 1;
}

function getRandomNumber() {
    return Math.floor(Math.random() * 1000);
}

function nextNum() {
    document.getElementById("number").innerHTML = getRandomNumber(); 
    document.getElementById("solution").innerHTML = ""; 
}

function showCorrect() {
    num = document.getElementById("number").innerHTML;
    document.getElementById("solution").innerHTML = numberAsString(num);
}
</script>
</body>
</html>
